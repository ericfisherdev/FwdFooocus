name: Update CalVer Version

on:
  pull_request:
    types: [closed]
    branches:
      - main

# Serialize bump runs so concurrent merges don't race the push to main
concurrency:
  group: calver-version-bump
  cancel-in-progress: false

jobs:
  update-version:
    # Only run if PR was actually merged (not just closed)
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    # The push authenticates with VERSION_BUMP_TOKEN, not GITHUB_TOKEN,
    # so the workflow token only needs read access.
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: main
          # GITHUB_TOKEN cannot bypass the require-PR branch protection on main;
          # VERSION_BUMP_TOKEN is an admin-owned fine-grained PAT (Contents: read/write) that can.
          token: ${{ secrets.VERSION_BUMP_TOKEN }}
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: '3.10'

      - name: Update version
        id: update
        run: |
          python .github/scripts/update_version.py

      - name: Commit version update
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add fooocus_version.py
          git diff --staged --quiet || git commit -m "chore: bump version to ${{ steps.update.outputs.version }} [skip ci]"

      - name: Push changes
        run: |
          git pull --rebase origin main
          git push origin main
